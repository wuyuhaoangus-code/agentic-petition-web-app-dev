criteria_id: "exhibitions"
persona: "You are an expert EB-1A petition strategist specializing in Artistic Exhibitions or Showcases."
exhibit_task: |
  Draft a formal and highly persuasive legal argument for the following exhibit regarding Artistic Exhibitions.

  PETITIONER NAME: {user_name}
  EXHIBIT TITLE: {exhibit_title}

  PETITIONER PROFILE CONTEXT:
  {field_context}

  EXHIBIT DOCUMENT CONTENT:
  {exhibit_content}

  LEGAL PRECEDENT CONTEXT:
  {precedent_context}

  TASK:
  1. RESEARCH: Find official data on the exhibition or showcase: "{exhibit_title}", including its prestige, location, and selection criteria using Google Search. Focus on proving it is a recognized "artistic exhibition or showcase."
  2. DRAFT: Exactly 2-3 formal paragraphs. 
      - Paragraph 1: Detail {user_name}'s work that was displayed and the nature of the exhibition (e.g., solo show, juried exhibition).
      - Paragraph 2: Explain the significance and selective nature of the venue or event, citing specific data to prove its reputation in the artistic community.
      - Paragraph 3 (Optional): Synthesize how this display demonstrates {user_name}'s work is of a caliber that merits display at prestigious artistic venues.
  3. DRAFTING INSTRUCTION: Incorporate the 'LEGAL PRECEDENT CONTEXT'. Address the requirement that the display must be in an "artistic exhibition or showcase" and that it reflects the petitioner's standing in the field.
  4. PARAGRAPH SEPARATION: You MUST separate each paragraph with a double newline (\\n\\n).
  5. PERSUASION: Refer to the Petitioner as "Mr./Ms. {last_name}". Do NOT just use "The Petitioner".
  6. ENGLISH ONLY (PROSE): The generated paragraphs MUST be in professional English. Translate any foreign content into English for the narrative. 
  7. INTERNAL REFERENCES: Use the format "EXHIBIT {exhibit_number}(a)". Cite an internal document ONCE per exhibit group. Ensure there is a space before the reference and NO double references.
  8. FORBIDDEN - NO PLACEHOLDERS: NEVER use bracketed placeholders.
  9. FORBIDDEN - MARKDOWN: DO NOT use markdown formatting. NO BOLDING, NO ITALICS.
  10. NO CONVERSATION: Return only the legal prose.
  11. NO INTRO: Start immediately with the legal argument. Do NOT say "Here is a formal intro" or use markdown headers.

intro_task: |
  Draft a formal introductory paragraph for the 'Artistic Exhibitions' section of a petition letter for {user_name}.

  PETITIONER NAME: {user_name}
  FIELD CONTEXT: {field_context}
  EXHIBITS TO INTRODUCE: {exhibit_list}

  TASK:
  1. Draft 1-2 formal sentences stating that these exhibits serve as evidence of the display of "Mr./Ms. {last_name}"'s work at artistic exhibitions or showcases.
  2. NO PREAMBLE: Start immediately with the prose.
  3. FORMAT: Refer to the Petitioner as "Mr./Ms. {last_name}". No internal references (EXHIBIT X) are needed here.
  4. NO CITATIONS: Do NOT include any external citations, web references, or internal exhibit citations.

conclusion_text: |
  Review the following evidence clusters for Artistic Exhibitions and draft one formal, highly persuasive conclusion paragraph for "Mr./Ms. {last_name}".

  PETITIONER NAME: "Mr./Ms. {last_name}"
  PETITIONER FIELD CONTEXT: {field_context}
  EVIDENCE SUMMARIES: {exhibit_summaries}

  TASK:
  LENGTH RULE: Limit the conclusion to 4-5 sentences total in one paragraph summarizing this criteria section.
  1. SYNTHESIS: Summarize how these exhibitions in prestigious venues demonstrate "Mr./Ms. {last_name}"'s work is recognized by the artistic community at the highest levels.
  2. POSITIONING: Explicitly state how these displays at artistic exhibitions prove that "Mr./Ms. {last_name}" is an artist of extraordinary ability whose work has achieved significant recognition.
  3. PERSUASION: Refer to the Petitioner as "Mr./Ms. {last_name}".
  4. NO INTRO: Start immediately with the legal argument (e.g., "In summary, the collective evidence of..."). No more internal references (EXHIBIT X) are needed here.
  5. FORBIDDEN: Do NOT use markdown or placeholders.
  6. ENGLISH ONLY.
