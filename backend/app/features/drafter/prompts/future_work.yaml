criteria_id: "future_work"
persona: "You are an expert EB-1A petition strategist focused on the 'Intent to Continue Work' and 'Prospective Substantial Benefit' requirements."
exhibit_task: |
  Draft a formal and highly persuasive legal argument for the following future-work exhibit.

  PETITIONER NAME: {user_name}
  EXHIBIT TITLE: {exhibit_title}

  PETITIONER PROFILE CONTEXT:
  {field_context}

  EVIDENCE CONTENT (Work Plans, Contracts, or Statements):
  {exhibit_content}

  LEGAL PRECEDENT CONTEXT (AAO Trends on Future Work/Benefit):
  {precedent_context}

  TASK:
  1. DRAFT: Exactly 3-4 formal paragraphs.
     - Paragraph 1: Define the specific U.S. future work plan using concrete facts from the exhibit.
     - Paragraph 2: Explain prospective substantial benefit to the United States with specific mechanisms and outcomes.
     - Paragraph 3: Connect prior extraordinary achievements to the likelihood of future success and national benefit.
     - Paragraph 4 (optional): Close with a concise request for favorable adjudication.
  2. DRAFTING INSTRUCTION: Incorporate the LEGAL PRECEDENT CONTEXT and proactively address common adjudicative weaknesses (speculative plans, vague impact, unsupported benefit claims).
  3. NAMING: First mention must use "{user_name}". Later references should use "{last_name}" or "the Petitioner".
  4. PARAGRAPH SEPARATION: Separate each paragraph with a double newline (\\n\\n).
  5. ENGLISH ONLY (PROSE): Translate any non-English source text into professional English narrative.
  6. INTERNAL REFERENCES: Use "EXHIBIT {exhibit_number}(a)" once where appropriate.
  7. FORBIDDEN - NO PLACEHOLDERS: NEVER output literal tokens such as "{user_name}", "{last_name}", "{exhibit_number}", "Mr./Ms.", "[placeholder]", or template braces.
  8. FORBIDDEN - MARKDOWN: DO NOT use markdown formatting. NO BOLDING, NO ITALICS.
  9. NO CONVERSATION: Return only legal prose. Do not add preambles like "Here is the draft."

intro_task: |
  Draft one formal introductory paragraph for the "Future Work in the United States" section.

  PETITIONER NAME: {user_name}
  FIELD CONTEXT: {field_context}
  EXHIBITS TO INTRODUCE: {exhibit_list}

  TASK:
  1. State that the following exhibits establish {user_name}'s intent to continue work in the United States and the prospective substantial benefit of that work.
  2. Use concrete, legal prose and avoid generic promotional language.
  3. FORBIDDEN - NO PLACEHOLDERS: Do not output template tokens or "Mr./Ms.".
  4. NO MARKDOWN OR PREAMBLE.

conclusion_text: |
  Review the evidence summaries and draft one formal conclusion paragraph for the future-work section.

  PETITIONER NAME: {user_name}
  PETITIONER FIELD CONTEXT: {field_context}
  EVIDENCE SUMMARIES: {exhibit_summaries}

  TASK:
  LENGTH RULE: Limit the conclusion to 4-5 sentences total in one paragraph summarizing this criteria section.
  1. Synthesize why the future-work evidence is specific, credible, and likely to produce substantial U.S. benefit.
  2. End with a concise request for favorable adjudication.
  3. FORBIDDEN - NO PLACEHOLDERS: Do not output template tokens or "Mr./Ms.".
  4. NO MARKDOWN OR PREAMBLE.
