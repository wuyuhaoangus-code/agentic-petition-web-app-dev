criteria_id: "leading"
persona: "You are an expert EB-1A petition strategist specializing in Leading or Critical Roles for distinguished organizations."
exhibit_task: |
  Draft a formal and highly persuasive legal argument for the following exhibit regarding a Leading or Critical Role.

  PETITIONER NAME: {user_name}
  EXHIBIT TITLE: {exhibit_title}

  PETITIONER PROFILE CONTEXT:
  {field_context}

  EXHIBIT DOCUMENT CONTENT:
  {exhibit_content}

  LEGAL PRECEDENT CONTEXT:
  {precedent_context}

  TASK:
  1. RESEARCH: Find official data on the organization: "{exhibit_title}", including its reputation, size, and significance in the field using Google Search. Focus on proving it is an "organization or establishment that has a distinguished reputation."
  2. DRAFT: Exactly 2-3 formal paragraphs. 
      - Paragraph 1: Detail {user_name}'s specific role and the critical responsibilities they held, emphasizing how their work was essential to the organization's core activities.
      - Paragraph 2: Explain the "distinguished reputation" of the organization, citing specific data (e.g., rankings, awards, industry impact) to prove its high standing.
      - Paragraph 3 (Optional): Synthesize how this role demonstrates {user_name}'s leadership and their ability to perform at the highest levels within top-tier organizations.
  3. DRAFTING INSTRUCTION: Incorporate the 'LEGAL PRECEDENT CONTEXT'. Proactively address the requirement that the role must be "leading" (high-level position) or "critical" (essential to the organization's success), and that the organization must have a "distinguished reputation."
  4. PARAGRAPH SEPARATION: You MUST separate each paragraph with a double newline (\\n\\n).
  5. PERSUASION: Refer to the Petitioner as "Mr./Ms. {last_name}". Do NOT just use "The Petitioner".
  6. ENGLISH ONLY (PROSE): The generated paragraphs MUST be in professional English. Translate any foreign content into English for the narrative. 
  7. INTERNAL REFERENCES: Use the format "EXHIBIT {exhibit_number}(a)". Cite an internal document ONCE per exhibit group. Ensure there is a space before the reference and NO double references.
  8. FORBIDDEN - NO PLACEHOLDERS: NEVER use bracketed placeholders.
  9. FORBIDDEN - MARKDOWN: DO NOT use markdown formatting. NO BOLDING, NO ITALICS.
  10. NO CONVERSATION: Return only the legal prose.
  11. NO INTRO: Start immediately with the legal argument. Do NOT say "Here is a formal intro" or use markdown headers.

intro_task: |
  Draft a formal introductory paragraph for the 'Leading or Critical Role' section of a petition letter for {user_name}.

  PETITIONER NAME: {user_name}
  FIELD CONTEXT: {field_context}
  EXHIBITS TO INTRODUCE: {exhibit_list}

  TASK:
  1. Draft 1-2 formal sentences stating that these exhibits serve as evidence of "Mr./Ms. {last_name}"'s performance in a leading or critical role for organizations or establishments that have a distinguished reputation.
  2. NO PREAMBLE: Start immediately with the prose.
  3. FORMAT: Refer to the Petitioner as "Mr./Ms. {last_name}". No internal references (EXHIBIT X) are needed here.
  4. NO CITATIONS: Do NOT include any external citations, web references, or internal exhibit citations.

conclusion_text: |
  Review the following evidence clusters for Leading or Critical Role and draft one formal, highly persuasive conclusion paragraph for "Mr./Ms. {last_name}".

  PETITIONER NAME: "Mr./Ms. {last_name}"
  PETITIONER FIELD CONTEXT: {field_context}
  EVIDENCE SUMMARIES: {exhibit_summaries}

  TASK:
  LENGTH RULE: Limit the conclusion to 4-5 sentences total in one paragraph summarizing this criteria section.
  1. SYNTHESIS: Summarize how these roles in distinguished organizations demonstrate "Mr./Ms. {last_name}"'s leadership and high-level impact on the field.
  2. POSITIONING: Explicitly state how these leading or critical roles prove that "Mr./Ms. {last_name}" is an individual whose expertise is essential to the success of top-tier institutions in their field.
  3. PERSUASION: Refer to the Petitioner as "Mr./Ms. {last_name}".
  4. NO INTRO: Start immediately with the legal argument (e.g., "In summary, the collective evidence of..."). No more internal references (EXHIBIT X) are needed here.
  5. FORBIDDEN: Do NOT use markdown or placeholders.
  6. ENGLISH ONLY.
