services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    volumes:
      - ./backend/credentials.json:/app/credentials.json:ro

  uikelsey:
    build:
      context: ./Uikelsey
      args:
        - VITE_API_BASE_URL=http://localhost:8080/api/v1
        - VITE_STRIPE_PRICE_EB1A=price_1T5BEPPPaco9kB5mSjEfKYAS
    ports:
      - "5173:80"
    depends_on:
      - backend
